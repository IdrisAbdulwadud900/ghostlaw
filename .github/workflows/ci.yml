name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx
      - name: Run Pytest
        env:
          TESTING: "true"
          JWT_SECRET: "test_secret_for_ci_123"
          SUPABASE_URL: "http://localhost:8000"
          SUPABASE_KEY: "test_key"
        run: |
          cd backend
          pytest tests -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          cd app
          npm ci
      - name: Build Next.js
        run: |
          cd app
          npm run build
